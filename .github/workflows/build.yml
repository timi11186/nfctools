name: Build NFC Burning Tool

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:    # 允许在 GitHub 网页上手动触发

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: NFC烧录系统-Windows
            artifact_path: dist/NFC烧录系统/
          - os: macos-latest
            artifact_name: NFC烧录系统-macOS
            artifact_path: dist/NFC烧录系统.app/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # Linux 不需要，但 macOS / Windows 都要先装 swig 才能装 pyscard
      - name: Install swig (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install swig

      - name: Install swig (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install swig -y --no-progress
        shell: pwsh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: python build_client.py --keep-config

      # macOS 产物压缩成 zip 方便上传
      - name: Compress macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r NFC烧录系统-macOS.zip NFC烧录系统.app config.json README.txt
        shell: bash

      # Windows 产物压缩成 zip
      - name: Compress Windows folder
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path "NFC烧录系统/*", "config.json", "README.txt" -DestinationPath "NFC烧录系统-Windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/NFC烧录系统-*.zip
          retention-days: 30

  # 当推送 tag 时（如 v1.0.0），自动创建 Release 并把 Windows + macOS 产物附上
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
